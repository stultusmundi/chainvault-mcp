name: Bug Report
description: Report a bug in ChainVault MCP
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of ChainVault is affected?
      options:
        - Vault (encryption, keys, agent vaults)
        - Rules Engine (access control, limits)
        - Chain Adapter (EVM, transactions, reads)
        - API Proxy (rate limiting, caching)
        - MCP Server (tool handlers)
        - CLI / TUI (commands, interface)
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Run: npm list chainvault-mcp or check package.json"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the bug
      placeholder: |
        1. Run `chainvault init`
        2. Run `chainvault key add test`
        3. ...
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Logs, screenshots, or other relevant information
    validations:
      required: false
